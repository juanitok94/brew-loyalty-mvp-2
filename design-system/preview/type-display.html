<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
  body { margin: 0; background: #faf8f5; padding: 20px 24px; }

<div class="eyebrow">Inknut Antiqua — Display</div>
