<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #faf8f5; font-family: 'Instrument Sans', system-ui, sans-serif; padding: 20px 24px; display: flex; gap: 14px; flex-wrap: wrap; }
  .card { background: #fff; border: 1.5px solid #E8DDD4; border-radius: 20px; padding: 16px; width: 180px; }
  .card-muted { background: #F5EFE6; border-radius: 16px; padding: 14px; width: 140px; text-align: center; }
  .title { font-size: 13px; font-weight: 600; color: #4A3526; margin-bottom: 2px; }
  .sub { font-size: 11px; color: #8B6F56; }
  .stat { font-size: 22px; font-weight: 700; color: #6B4F36; }
  .divider { border: none; border-top: 1px solid #E8DDD4; margin: 10px 0; }
</style>
</head><body>
<div class="card">
  <div class="title">(828) 555-0123</div>
  <div class="sub">Last visit: 2 days ago · 3 free drinks earned</div>
  <hr class="divider">
  <div class="sub">Stamp card</div>
  <div class="stat">7 / 9</div>
</div>
<div class="card-muted">
  <div class="stat">7</div>
  <div class="sub">current stamps</div>
</div>
<div class="card-muted">
  <div class="stat">3</div>
  <div class="sub">free drinks earned</div>
</div>
</body></html>
