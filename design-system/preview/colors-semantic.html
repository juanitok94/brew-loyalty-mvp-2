<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #faf8f5; font-family: 'Instrument Sans', system-ui, sans-serif; padding: 20px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .chip { width: 36px; height: 36px; border-radius: 6px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }
  .token { font-size: 12px; font-family: monospace; color: #6B4F36; flex: 1; }
  .val { font-size: 11px; color: #8B6F56; }
</style>
</head><body>
<div class="row"><div class="chip" style="background:var(--color-primary)"></div><div class="token">--color-primary</div><div class="val">#6B4F36</div></div>
<div class="row"><div class="chip" style="background:var(--color-primary-dark)"></div><div class="token">--color-primary-dark</div><div class="val">#4A3526</div></div>
<div class="row"><div class="chip" style="background:var(--color-secondary)"></div><div class="token">--color-secondary</div><div class="val">#4C6762</div></div>
<div class="row"><div class="chip" style="background:var(--color-surface)"></div><div class="token">--color-surface</div><div class="val">#FFFFFF</div></div>
<div class="row"><div class="chip" style="background:var(--color-surface-muted)"></div><div class="token">--color-surface-muted</div><div class="val">#F5EFE6</div></div>
<div class="row"><div class="chip" style="background:var(--color-border)"></div><div class="token">--color-border</div><div class="val">#E8DDD4</div></div>
<div class="row"><div class="chip" style="background:var(--color-error)"></div><div class="token">--color-error</div><div class="val">#DC2626</div></div>
<div class="row"><div class="chip" style="background:var(--color-success)"></div><div class="token">--color-success</div><div class="val">#16A34A</div></div>
</body></html>
