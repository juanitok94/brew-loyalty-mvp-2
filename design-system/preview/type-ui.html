<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #faf8f5; padding: 20px 24px; }
  .row { margin-bottom: 10px; display: flex; align-items: baseline; gap: 14px; }
  .tag { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #8B6F56; width: 72px; flex-shrink: 0; }
  .spec { font-size: 10px; color: #8B6F56; }
  .body-lg { font-family: 'Instrument Sans', sans-serif; font-size: 16px; color: #1A1210; }
  .body-sm { font-family: 'Instrument Sans', sans-serif; font-size: 14px; color: #1A1210; }
  .semibold { font-weight: 600; }
  .muted { color: #8B6F56; }
  .caps { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Instrument Sans', sans-serif; color: #8B6F56; }
  .divider { border: none; border-top: 1px solid #E8DDD4; margin: 6px 0; }
</style>
</head><body>
<div class="row">
  <span class="tag">Body</span>
  <span class="body-lg">Enter your phone number to see your card</span>
</div>
<hr class="divider">
<div class="row">
  <span class="tag">Semibold</span>
  <span class="body-lg semibold">3 more coffees until your free drink</span>
</div>
<hr class="divider">
<div class="row">
  <span class="tag">Small</span>
  <span class="body-sm muted">Not valid on smoothies or frappes. One stamp per drink</span>
</div>
<hr class="divider">
<div class="row">
  <span class="tag">Eyebrow</span>
  <span class="caps">Striving for balance</span>
</div>
<hr class="divider">
<div class="row">
  <span class="tag">Mono</span>
  <span style="font-family:monospace;font-size:13px;color:#6B4F36">(828) 555-0123</span>
</div>
</body></html>
