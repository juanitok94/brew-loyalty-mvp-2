<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@500&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #DFDFD8; display: flex; align-items: center; justify-content: center; min-height: 150px; padding: 16px; box-sizing: border-box; }
  .logos { display: flex; gap: 40px; align-items: center; }
  .on-cream { background: #DFDFD8; padding: 16px 24px; border-radius: 8px; display: flex; align-items: center; gap: 14px; }
  .on-black { background: #000; padding: 16px 24px; border-radius: 8px; display: flex; align-items: center; gap: 14px; }
  img { width: 72px; height: 72px; object-fit: contain; }
  .wordmark { font-family: 'Inknut Antiqua', serif; font-size: 18px; font-weight: 500; color: #4A3526; letter-spacing: 0.01em; line-height: 1.2; }
  .wordmark-light { color: #E8D9B0; }
</style>
</head><body>
<div class="logos">
  <div class="on-cream">
    <img src="../assets/rowan-logo.webp" alt="Rowan Coffee logo">
    <div class="wordmark">Rowan<br>Coffee</div>
  </div>
  <div class="on-black">
    <img src="../assets/rowan-logo.webp" alt="Rowan Coffee logo">
    <div class="wordmark wordmark-light">Rowan<br>Coffee</div>
  </div>
</div>
</body></html>
