<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #faf8f5; font-family: 'Instrument Sans', system-ui, sans-serif; padding: 20px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; border-radius: 8px; overflow: hidden; }
  .chip { height: 72px; }
  .label { padding: 6px 8px; }
  .name { font-size: 11px; font-weight: 600; color: #4A3526; }
  .hex  { font-size: 10px; color: #8B6F56; font-family: monospace; }
</style>
</head><body>
<div class="grid">
  <div class="swatch">
    <div class="chip" style="background:#E8D9B0"></div>
    <div class="label"><div class="name">Cream</div><div class="hex">#E8D9B0</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#DFDFD8"></div>
    <div class="label"><div class="name">Cream BG</div><div class="hex">#DFDFD8</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#8F6B41"></div>
    <div class="label"><div class="name">Gold Brown</div><div class="hex">#8F6B41</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#7B5A2A"></div>
    <div class="label"><div class="name">Logo Border</div><div class="hex">#7B5A2A</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#4C6762"></div>
    <div class="label"><div class="name">Teal</div><div class="hex">#4C6762</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#000000"></div>
    <div class="label"><div class="name">Black</div><div class="hex">#000000</div></div>
  </div>
</div>
</body></html>
