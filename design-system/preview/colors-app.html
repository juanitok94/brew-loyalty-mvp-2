<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #faf8f5; font-family: 'Instrument Sans', system-ui, sans-serif; padding: 20px; }
  .grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 80px; border-radius: 8px; overflow: hidden; border: 1px solid #E8DDD4; }
  .chip { height: 64px; }
  .label { padding: 6px 8px; background: #fff; }
  .name { font-size: 11px; font-weight: 600; color: #4A3526; }
  .hex  { font-size: 10px; color: #8B6F56; font-family: monospace; }
</style>
</head><body>
<div class="grid">
  <div class="swatch">
    <div class="chip" style="background:#FAF8F5"></div>
    <div class="label"><div class="name">BG</div><div class="hex">#FAF8F5</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#F5EFE6"></div>
    <div class="label"><div class="name">Cream</div><div class="hex">#F5EFE6</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#6B4F36"></div>
    <div class="label"><div class="name">Brown</div><div class="hex">#6B4F36</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#8B6F56"></div>
    <div class="label"><div class="name">Brown Lt</div><div class="hex">#8B6F56</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#4A3526"></div>
    <div class="label"><div class="name">Brown Dk</div><div class="hex">#4A3526</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#E8DDD4"></div>
    <div class="label"><div class="name">Stamp Empty</div><div class="hex">#E8DDD4</div></div>
  </div>
  <div class="swatch">
    <div class="chip" style="background:#1A1210"></div>
    <div class="label"><div class="name">Text</div><div class="hex">#1A1210</div></div>
  </div>
</div>
</body></html>
