<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowan Coffee — Loyalty App UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;500;600&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #1A1210;
      font-family: 'Instrument Sans', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Top nav / screen switcher */
    .kit-nav {
      width: 100%;
      background: #0F0A08;
      border-bottom: 1px solid #2A1F18;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .kit-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kit-brand img { width: 32px; height: 32px; object-fit: contain; }
    .kit-brand-name { font-family: 'Inknut Antiqua', serif; font-size: 13px; font-weight: 500; color: #E8D9B0; letter-spacing: 0.01em; }
    .kit-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #8B6F56; background: #2A1F18; padding: 3px 8px; border-radius: 6px; }

    .kit-screens {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .kit-tab {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: #8B6F56;
    }
    .kit-tab:hover { background: #2A1F18; color: #E8D9B0; }
    .kit-tab.active { background: #6B4F36; color: #fff; }

    /* Phone frame */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    .phone-frame {
      width: 390px;
      min-height: 700px;
      background: #000000;
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 0 0 10px #111, 0 0 0 13px #2A1F18, 0 32px 80px rgba(0,0,0,0.7);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    /* Status bar — sits on black header */
    .status-bar {
      background: #000000;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px 0 40px;
      flex-shrink: 0;
      position: relative;
    }
    .status-bar-time { font-size: 15px; font-weight: 600; color: #E8D9B0; }
    .status-bar-icons { display: flex; align-items: center; gap: 5px; color: #E8D9B0; font-size: 12px; }
    /* Notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000000;
    }
    .notch-pill {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000000;
      border-radius: 20px;
    }
    .screen-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .screen-content::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<nav class="kit-nav">
  <div class="kit-brand">
    <img src="../../assets/rowan-logo.webp" alt="Rowan Coffee">
    <span class="kit-brand-name">Rowan Coffee</span>
    <span class="kit-badge">UI Kit</span>
  </div>
  <div class="kit-screens" id="tab-bar"></div>
</nav>

<div class="stage">
  <div class="phone-frame">
    <div class="status-bar">
      <span class="status-bar-time">9:41</span>
      <div class="notch-pill"></div>
      <div class="status-bar-icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>🔋</span>
      </div>
    </div>
    <div class="screen-content" id="app-root"></div>
  </div>
</div>

<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="CardScreen.jsx"></script>
<script type="text/babel" src="AdminLogin.jsx"></script>
<script type="text/babel" src="AdminDashboard.jsx"></script>

<script type="text/babel">
const SCREENS = [
  { id: 'home',      label: 'Home',          component: 'HomeScreen' },
  { id: 'card',      label: 'Stamp Card',    component: 'CardScreen' },
  { id: 'admin',     label: 'Admin Login',   component: 'AdminLogin' },
  { id: 'dashboard', label: 'Admin Dashboard', component: 'AdminDashboard' },
];

function App() {
  const saved = (() => { try { return localStorage.getItem('rowan-kit-screen') || 'home'; } catch { return 'home'; } })();
  const [screen, setScreen] = React.useState(saved);
  const [phoneDigits, setPhoneDigits] = React.useState('');

  React.useEffect(() => {
    try { localStorage.setItem('rowan-kit-screen', screen); } catch {}
  }, [screen]);

  // Wire up nav tabs
  React.useEffect(() => {
    const bar = document.getElementById('tab-bar');
    if (!bar) return;
    bar.innerHTML = '';
    SCREENS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'kit-tab' + (screen === s.id ? ' active' : '');
      btn.textContent = s.label;
      btn.onclick = () => setScreen(s.id);
      bar.appendChild(btn);
    });
  });

  const navigate = (to, opts = {}) => {
    if (opts.phone) setPhoneDigits(opts.phone);
    setScreen(to);
  };

  return (
    <div style={{ minHeight: '100%' }}>
      {screen === 'home' && (
        <HomeScreen onSubmit={digits => navigate('card', { phone: digits })} />
      )}
      {screen === 'card' && (
        <CardScreen
          phone={phoneDigits || '8285550123'}
          stamps={5}
          redeemed={2}
          onBack={() => navigate('home')}
        />
      )}
      {screen === 'admin' && (
        <AdminLogin onLogin={() => navigate('dashboard')} />
      )}
      {screen === 'dashboard' && (
        <AdminDashboard onLogout={() => navigate('admin')} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
</html>
